// GRPC definition for the communication between the aggregator and the executors.
// After modifying this file, regenerate the Python bindings with grpc_tools.protoc.

syntax = "proto3";

package fedscale;

service JobService {
    rpc CLIENT_REGISTER (RegisterRequest) returns (ServerResponse) {}
    rpc CLIENT_PING (PingRequest) returns (ServerResponse) {}
    rpc CLIENT_EXECUTE_COMPLETION (CompleteRequest) returns (ServerResponse) {}

    // Large-payload data plane.
    rpc DOWNLOAD_DATA (TransferRequest) returns (stream DataChunk) {}
    rpc UPLOAD_DATA (stream DataChunk) returns (UploadReply) {}
}

message ServerResponse {
    string event = 1;
    bytes meta = 2;
    bytes data = 3;
}

message RegisterRequest {
    string client_id = 1;
    string executor_id = 2;
    bytes executor_info = 3;
}

message PingRequest {
    string client_id = 1;
    string executor_id = 2;
}

message CompleteRequest {
    string client_id = 1;
    string executor_id = 2;
    string event = 3;
    bool status = 4;
    string msg = 5;
    string meta_result = 6;
    bytes data_result = 7;
}

// Request a previously registered large payload.
message TransferRequest {
    string transfer_id = 1;
    string executor_id = 2;
}

// One chunk of a larger payload.
message DataChunk {
    string transfer_id = 1;
    int64 chunk_index = 2;
    int64 total_chunks = 3;
    int64 total_bytes = 4;
    bytes data = 5;

    // Used for streamed client uploads.
    string client_id = 6;
    string executor_id = 7;
    string event = 8;

}

// Acknowledge a streamed upload.
message UploadReply {
    bool success = 1;
    string transfer_id = 2;
    string message = 3;
    ServerResponse response = 4;
}
